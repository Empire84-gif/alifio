{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
  :root {
    --aa-bg: #101722;
    --aa-surface: #1a2230;
    --aa-surface-2: #212b3a;
    --aa-surface-3: #2a3547;
    --aa-border: rgba(255, 255, 255, 0.20);
    --aa-border-2: rgba(255, 255, 255, 0.28);
    --aa-border-3: rgba(255, 255, 255, 0.38);
    --aa-text: #f4f7fb;
    --aa-text-2: #dce2eb;
    --aa-text-3: #cfd8e5;
    --aa-text-4: #aeb8c8;
    --aa-t: 0.16s ease;
    --aa-r: 2px;
  }

  .flash-wrapper {
    display: none;
  }

  body {
    background: var(--aa-bg) !important;
  }

  .page-wrap,
  main.container {
    background: transparent !important;
  }

  .activate-account-page,
  .activate-account-page * {
    box-sizing: border-box;
  }

  .activate-account-page,
.activate-account-page input,
.activate-account-page label,
.activate-account-page p,
.activate-account-page div {
  font-family: "LexendDecaLocal", Arial, sans-serif;
}

  .activate-account-btn,
  .activate-account-btn *,
  .activate-account-btn-secondary,
  .activate-account-btn-secondary * {
    font-family: "LexendDecaLocal", Arial, sans-serif !important;
  }

  .activate-account-page {
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    color: var(--aa-text);
  }

  .activate-account-card {
    display: grid;
    gap: 0;
    padding: 18px 20px;
    border: 1px solid var(--aa-border-2);
    border-radius: var(--aa-r);
    background: var(--aa-surface);
    box-shadow:
      0 0 56px rgba(255, 255, 255, 0.03),
      0 34px 80px rgba(0, 0, 0, 0.42);
  }

  .activate-account-title {
    margin: 0;
    color: var(--aa-text);
    font-size: 21px;
    font-weight: 400;
    line-height: 1.14;
  }

  .activate-account-note {
    margin: 4px 0 0;
    color: var(--aa-text-3);
    font-size: 12px;
    line-height: 1.5;
  }

  .activate-account-summary {
    display: grid;
    gap: 6px;
    margin-top: 16px;
    padding: 12px;
    border: 1px solid var(--aa-border);
    border-radius: var(--aa-r);
    background: var(--aa-surface-2);
  }

  .activate-account-summary-label {
    color: var(--aa-text-4);
    font-size: 8.5px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    line-height: 1.2;
  }

  .activate-account-summary-value {
    color: var(--aa-text);
    font-size: 11.5px;
    line-height: 1.45;
  }

  .activate-account-form {
    display: grid;
    gap: 0;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--aa-border);
  }

  .activate-account-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .activate-account-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .activate-account-row label {
    color: var(--aa-text-4);
    font-size: 8.5px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    line-height: 1.2;
  }

  .activate-account-page input {
    width: 100%;
    height: 34px;
    min-height: 34px;
    padding: 0 10px;
    border: 1px solid var(--aa-border-2);
    border-radius: var(--aa-r);
    background: var(--aa-surface-3);
    color: var(--aa-text);
    font-size: 11.5px;
    transition: border-color var(--aa-t), box-shadow var(--aa-t), background var(--aa-t);
  }

  .activate-account-page input::placeholder {
    color: var(--aa-text-4);
    opacity: 1;
  }

  .activate-account-page input:hover {
    border-color: var(--aa-border-3);
  }

  .activate-account-page input:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 18%, transparent);
  }

  .activate-account-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .activate-account-btn,
  .activate-account-btn-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 34px;
    padding: 0 14px;
    border-radius: var(--aa-r);
    font-size: 11px;
    font-weight: 400;
    line-height: 1;
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
    transition: background var(--aa-t), color var(--aa-t), border-color var(--aa-t), transform var(--aa-t);
  }

  .activate-account-btn {
    border: 1px solid var(--primary-color);
    background: var(--primary-color);
    color: #ffffff;
  }

  .activate-account-btn:hover {
    background: transparent;
    color: var(--aa-text);
    border-color: var(--primary-color);
    transform: translateY(-1px);
  }

  .activate-account-btn-secondary {
    border: 1px solid var(--aa-border-2);
    background: var(--aa-surface-3);
    color: var(--aa-text-2);
  }

  .activate-account-btn-secondary:hover {
    border-color: var(--primary-color);
    background: transparent;
    color: var(--aa-text);
    transform: translateY(-1px);
  }

  .password-field-wrap {
    position: relative;
    width: 100%;
    min-width: 0;
  }

  .password-field-wrap .js-password-input {
    display: block;
    width: 100%;
    min-width: 0;
    height: 34px;
    min-height: 34px;
    box-sizing: border-box;
    padding: 0 42px 0 10px !important;
    background: #f4f7fb !important;
    border: 1px solid rgba(20, 28, 40, 0.16) !important;
    color: #16202b !important;
    font-size: 11.5px;
    font-weight: 400;
    line-height: 1;
    font-family: "LexendDecaLocal", Arial, sans-serif;
    -webkit-text-fill-color: #16202b;
    appearance: none;
    -webkit-appearance: none;
    border-radius: var(--aa-r);
  }

  .password-field-wrap .js-password-input::placeholder {
    color: #7b8794 !important;
    opacity: 1;
  }

  .password-field-wrap .js-password-input:hover {
    border-color: rgba(20, 28, 40, 0.28) !important;
  }

  .password-field-wrap .js-password-input:focus {
    outline: none !important;
    border-color: var(--primary-color) !important;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 18%, transparent) !important;
    background: #ffffff !important;
  }

  .password-field-wrap .js-password-input[type="password"],
  .password-field-wrap .js-password-input[type="text"] {
    letter-spacing: 0;
  }

  .password-toggle-btn {
    position: absolute;
    top: 50%;
    right: 10px;
    transform: translateY(-50%);
    width: 26px;
    height: 26px;
    padding: 0;
    border: none;
    background: transparent;
    color: #556476;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color var(--aa-t), opacity var(--aa-t);
  }

  .password-toggle-btn:hover {
    color: #16202b;
  }

  .password-toggle-btn:focus {
    outline: none;
    color: var(--primary-color);
  }

  .password-toggle-btn i {
    line-height: 1;
    display: block;
  }

  @media (max-width: 1024px) {
    .activate-account-card {
      padding: 16px;
    }

    .activate-account-actions {
      justify-content: stretch;
    }

    .activate-account-btn,
    .activate-account-btn-secondary {
      width: 100%;
    }
  }

  /* ========================================
   JASNE INPUTY EMAIL / HASŁO
======================================== */

input[type="email"],
input[type="password"],
input[type="text"].auth-email-input,
input[type="text"].auth-password-input {
  background: #f4f7fb !important;
  border: 1px solid rgba(20, 28, 40, 0.16) !important;
  color: #16202b !important;
  -webkit-text-fill-color: #16202b;
}

input[type="email"]::placeholder,
input[type="password"]::placeholder,
input[type="text"].auth-email-input::placeholder,
input[type="text"].auth-password-input::placeholder {
  color: #7b8794 !important;
  opacity: 1;
}

input[type="email"]:hover,
input[type="password"]:hover,
input[type="text"].auth-email-input:hover,
input[type="text"].auth-password-input:hover {
  border-color: rgba(20, 28, 40, 0.28) !important;
}

input[type="email"]:focus,
input[type="password"]:focus,
input[type="text"].auth-email-input:focus,
input[type="text"].auth-password-input:focus {
  outline: none !important;
  background: #ffffff !important;
  border-color: var(--primary-color) !important;
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 18%, transparent) !important;
}
</style>

<div class="activate-account-page">
  <section class="activate-account-card">
    <h2 class="activate-account-title">Aktywacja konta</h2>
    <p class="activate-account-note">
      Ustaw dane pierwszego administratora firmy i aktywuj konto.
    </p>

    <div class="activate-account-summary">
      <div>
        <div class="activate-account-summary-label">Firma</div>
        <div class="activate-account-summary-value">{{ invite.business_name }}</div>
      </div>

      <div>
        <div class="activate-account-summary-label">Adres e-mail</div>
        <div class="activate-account-summary-value">{{ invite.email }}</div>
      </div>
    </div>

    <form action="" method="POST" class="activate-account-form">
      <div class="activate-account-grid">
        <div class="activate-account-row">
          <label for="full_name">Imię i nazwisko administratora</label>
          <input
            type="text"
            name="full_name"
            id="full_name"
            placeholder="Wpisz imię i nazwisko"
            required
          >
        </div>

        <div class="activate-account-row">
          <label for="password">Hasło</label>
          <div class="password-field-wrap">
            <input
              type="password"
              name="password"
              id="password"
              class="js-password-input"
              placeholder="Wpisz hasło"
              required
            >
            <button type="button" class="password-toggle-btn js-password-toggle" aria-label="Pokaż hasło">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="activate-account-row">
          <label for="confirm_password">Powtórz hasło</label>
          <div class="password-field-wrap">
            <input
              type="password"
              name="confirm_password"
              id="confirm_password"
              class="js-password-input"
              placeholder="Powtórz hasło"
              required
            >
            <button type="button" class="password-toggle-btn js-password-toggle" aria-label="Pokaż hasło">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="activate-account-actions">
        <button type="submit" class="activate-account-btn">Aktywuj konto</button>
        <a href="{{ url_for('admin_login') }}" class="activate-account-btn-secondary">Wróć do logowania</a>
      </div>
    </form>
  </section>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const toggleButtons = document.querySelectorAll(".js-password-toggle");

  toggleButtons.forEach((button) => {
    button.addEventListener("click", function () {
      const wrap = button.closest(".password-field-wrap");
      if (!wrap) return;

      const input = wrap.querySelector(".js-password-input");
      const icon = button.querySelector("i");
      if (!input || !icon) return;

      const isPassword = input.type === "password";
      input.type = isPassword ? "text" : "password";
      icon.className = isPassword ? "bi bi-eye-slash" : "bi bi-eye";
      button.setAttribute("aria-label", isPassword ? "Ukryj hasło" : "Pokaż hasło");
    });
  });
});
</script>
{% endblock %}
