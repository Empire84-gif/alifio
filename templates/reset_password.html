{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preload" href="{{ url_for('static', filename='fonts/Roboto-Regular.ttf') }}" as="font" type="font/ttf" crossorigin>

<style>
  :root {
    --rp-bg: #101722;
    --rp-surface: #1a2230;
    --rp-surface-2: #212b3a;
    --rp-border: rgba(255, 255, 255, 0.20);
    --rp-border-2: rgba(255, 255, 255, 0.28);
    --rp-border-3: rgba(255, 255, 255, 0.38);
    --rp-text: #f4f7fb;
    --rp-text-2: #dce2eb;
    --rp-text-3: #cfd8e5;
    --rp-text-4: #aeb8c8;
    --rp-t: 0.16s ease;
    --rp-r: 2px;
  }

  .flash-wrapper {
    display: none;
  }

  body {
    background: var(--rp-bg) !important;
  }

  .page-wrap,
  main.container {
    background: transparent !important;
  }

  .reset-password-page,
  .reset-password-page * {
    box-sizing: border-box;
  }

  .reset-password-page,
  .reset-password-page input,
  .reset-password-page label,
  .reset-password-page p,
  .reset-password-page div {
    font-family: "RobotoLocal", Arial, sans-serif;
  }

  .reset-password-btn,
  .reset-password-btn *,
  .reset-password-btn-secondary,
  .reset-password-btn-secondary * {
    font-family: "LexendDecaLocal", Arial, sans-serif !important;
  }

  .reset-password-page {
    width: 100%;
    max-width: 760px;
    margin: 34px auto 0;
    color: var(--rp-text);
  }

  .reset-password-card {
    display: grid;
    gap: 0;
    padding: 18px 20px;
    border: 1px solid var(--rp-border-2);
    border-radius: var(--rp-r);
    background: var(--rp-surface);
    box-shadow:
      0 0 56px rgba(255, 255, 255, 0.03),
      0 34px 80px rgba(0, 0, 0, 0.42);
  }

  .reset-password-title {
    margin: 0;
    color: var(--rp-text);
    font-size: 21px;
    font-weight: 400;
    line-height: 1.14;
  }

  .reset-password-note {
    margin: 4px 0 0;
    color: var(--rp-text-3);
    font-size: 12px;
    line-height: 1.5;
  }

  .reset-password-form {
    display: grid;
    gap: 0;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--rp-border);
  }

  .reset-password-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .reset-password-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .reset-password-row label {
    color: var(--rp-text-4);
    font-size: 8.5px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    line-height: 1.2;
  }

  .password-field-wrap {
    position: relative;
    width: 100%;
    min-width: 0;
  }

  .password-field-wrap .js-password-input {
    display: block;
    width: 100%;
    min-width: 0;
    height: 34px;
    min-height: 34px;
    box-sizing: border-box;
    padding: 0 42px 0 10px !important;
    background: #f4f7fb !important;
    border: 1px solid rgba(20, 28, 40, 0.16) !important;
    color: #16202b !important;
    font-size: 11.5px;
    font-weight: 400;
    line-height: 1;
    font-family: "RobotoLocal", Arial, sans-serif;
    -webkit-text-fill-color: #16202b;
    appearance: none;
    -webkit-appearance: none;
    border-radius: var(--rp-r);
    transition: border-color var(--rp-t), box-shadow var(--rp-t), background var(--rp-t);
  }

  .password-field-wrap .js-password-input::placeholder {
    color: #7b8794 !important;
    opacity: 1;
  }

  .password-field-wrap .js-password-input:hover {
    border-color: rgba(20, 28, 40, 0.28) !important;
  }

  .password-field-wrap .js-password-input:focus {
    outline: none !important;
    border-color: var(--primary-color) !important;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 18%, transparent) !important;
    background: #ffffff !important;
  }

  .password-field-wrap .js-password-input[type="password"],
  .password-field-wrap .js-password-input[type="text"] {
    letter-spacing: 0;
  }

  .password-toggle-btn {
    position: absolute;
    top: 50%;
    right: 10px;
    transform: translateY(-50%);
    width: 26px;
    height: 26px;
    padding: 0;
    border: none;
    background: transparent;
    color: #556476;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color var(--rp-t), opacity var(--rp-t);
  }

  .password-toggle-btn:hover {
    color: #16202b;
  }

  .password-toggle-btn:focus {
    outline: none;
    color: var(--primary-color);
  }

  .password-toggle-btn i {
    line-height: 1;
    display: block;
  }

  .reset-password-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .reset-password-btn,
  .reset-password-btn-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 34px;
    padding: 0 14px;
    border-radius: var(--rp-r);
    font-size: 11px;
    font-weight: 400;
    line-height: 1;
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
    transition: background var(--rp-t), color var(--rp-t), border-color var(--rp-t), transform var(--rp-t);
  }

  .reset-password-btn {
    border: 1px solid var(--primary-color);
    background: var(--primary-color);
    color: #ffffff;
  }

  .reset-password-btn:hover {
    background: #ffffff;
    color: var(--primary-color);
    border-color: var(--primary-color);
    transform: translateY(-1px);
  }

  .reset-password-btn-secondary {
    border: 1px solid var(--rp-border-2);
    background: var(--rp-surface-2);
    color: var(--rp-text-2);
  }

  .reset-password-btn-secondary:hover {
    border-color: var(--primary-color);
    background: transparent;
    color: var(--rp-text);
    transform: translateY(-1px);
  }

  @media (max-width: 767px) {
    .reset-password-page {
      margin-top: 28px;
      max-width: 100%;
    }

    .reset-password-card {
      padding: 16px;
    }

    .reset-password-actions {
      justify-content: stretch;
    }

    .reset-password-btn,
    .reset-password-btn-secondary {
      width: 100%;
    }
  }

  @media (max-width: 480px) {
    .reset-password-page {
      margin-top: 22px;
    }

    .reset-password-card {
      padding: 12px;
    }

    .reset-password-title {
      font-size: 18px;
    }

    .reset-password-note {
      font-size: 11px;
    }

    .password-field-wrap .js-password-input {
      height: 30px;
      min-height: 30px;
      font-size: 10.5px;
    }

    .reset-password-btn,
    .reset-password-btn-secondary {
      min-height: 30px;
      font-size: 9.5px;
    }
  }

  
</style>

<div class="reset-password-page">
  <section class="reset-password-card">
    <h2 class="reset-password-title">Ustaw nowe hasło</h2>
    <p class="reset-password-note">
      Wprowadź nowe hasło do swojego konta i potwierdź zmianę.
    </p>

    <form action="" method="POST" class="reset-password-form">
      <div class="reset-password-grid">
        <div class="reset-password-row">
          <label for="password">Nowe hasło</label>
          <div class="password-field-wrap">
            <input
              type="password"
              name="password"
              id="password"
              class="js-password-input"
              placeholder="Wpisz nowe hasło"
              required
            >
            <button type="button" class="password-toggle-btn js-password-toggle" aria-label="Pokaż hasło">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="reset-password-row">
          <label for="confirm_password">Powtórz nowe hasło</label>
          <div class="password-field-wrap">
            <input
              type="password"
              name="confirm_password"
              id="confirm_password"
              class="js-password-input"
              placeholder="Powtórz nowe hasło"
              required
            >
            <button type="button" class="password-toggle-btn js-password-toggle" aria-label="Pokaż hasło">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="reset-password-actions">
        <button type="submit" class="reset-password-btn">Zapisz nowe hasło</button>
        <a href="{{ url_for('admin_login') }}" class="reset-password-btn-secondary">Wróć do logowania</a>
      </div>
    </form>
  </section>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const toggleButtons = document.querySelectorAll(".js-password-toggle");

  toggleButtons.forEach((button) => {
    button.addEventListener("click", function () {
      const wrap = button.closest(".password-field-wrap");
      if (!wrap) return;

      const input = wrap.querySelector(".js-password-input");
      const icon = button.querySelector("i");
      if (!input || !icon) return;

      const isPassword = input.type === "password";
      input.type = isPassword ? "text" : "password";
      icon.className = isPassword ? "bi bi-eye-slash" : "bi bi-eye";
      button.setAttribute("aria-label", isPassword ? "Ukryj hasło" : "Pokaż hasło");
    });
  });
});
</script>
{% endblock %}
