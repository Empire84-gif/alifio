{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
  :root {
    --rp-bg: #101722;
    --rp-surface: #1a2230;
    --rp-border: rgba(255, 255, 255, 0.20);
    --rp-border-2: rgba(255, 255, 255, 0.28);
    --rp-text: #f4f7fb;
    --rp-text-2: #c7d0dc;
    --rp-t: 0.16s ease;
    --rp-r: 2px;
  }

  .flash-wrapper {
    display: none;
  }

  body {
    background: var(--rp-bg) !important;
  }

  .page-wrap,
  main.container {
    background: transparent !important;
  }

  .reset-password-page,
  .reset-password-page * {
    box-sizing: border-box;
    font-family: "LexendDecaLocal", Arial, sans-serif;
  }

  .reset-password-page {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    color: var(--rp-text);
  }

  .reset-password-card.card {
    display: grid;
    gap: 0;
    padding: 18px 20px;
    border: 1px solid var(--rp-border-2);
    border-radius: var(--rp-r);
    background: var(--rp-surface) !important;
    box-shadow:
      0 0 56px rgba(255, 255, 255, 0.03),
      0 34px 80px rgba(0, 0, 0, 0.42);
  }

  .reset-password-title {
    margin: 0;
    color: var(--rp-text);
    font-size: 20px;
    font-weight: 400;
    line-height: 1.14;
    letter-spacing: 0.018em;
  }

  .reset-password-note {
    margin-top: 4px;
    color: var(--rp-text-2);
    font-size: 12px;
    line-height: 1.5;
    font-weight: 400;
    letter-spacing: 0.018em;
  }

  .reset-password-form {
    display: grid;
    gap: 0;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--rp-border);
  }

  .reset-password-form-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .reset-password-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .reset-password-row label {
    color: var(--rp-text-2);
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.075em;
    text-transform: uppercase;
  }

  .password-field-wrap {
    position: relative;
    width: 100%;
    min-width: 0;
  }

  .password-field-wrap .js-password-input {
    display: block;
    width: 100%;
    min-width: 0;
    height: 34px;
    min-height: 34px;
    padding: 0 42px 0 10px !important;
    border: 1px solid rgba(20, 28, 40, 0.16) !important;
    border-radius: var(--rp-r);
    outline: none;
    background: #f4f7fb !important;
    color: #16202b !important;
    -webkit-text-fill-color: #16202b;
    font-size: 11px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: 0.018em;
    appearance: none;
    -webkit-appearance: none;
    transition: border-color var(--rp-t), box-shadow var(--rp-t), background var(--rp-t), color var(--rp-t);
  }

  .password-field-wrap .js-password-input::placeholder {
    color: #7b8794 !important;
    opacity: 1;
  }

  .password-field-wrap .js-password-input:hover {
    border-color: rgba(20, 28, 40, 0.28) !important;
  }

  .password-field-wrap .js-password-input:focus {
    background: #ffffff !important;
    border-color: var(--primary-color) !important;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 18%, transparent) !important;
  }

  .password-toggle-btn {
    position: absolute;
    top: 50%;
    right: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    padding: 0;
    border: none;
    background: transparent;
    color: #556476;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    transform: translateY(-50%);
    transition: color var(--rp-t), opacity var(--rp-t);
  }

  .password-toggle-btn:hover {
    color: #16202b;
  }

  .password-toggle-btn:focus {
    outline: none;
    color: var(--primary-color);
  }

  .password-toggle-btn i,
  .password-toggle-btn i::before {
    font-family: "bootstrap-icons" !important;
    line-height: 1;
  }

  .reset-password-actions {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 28px;
    margin-bottom: 10px;
  }

  .reset-password-btn,
  .reset-password-btn-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    min-height: 34px;
    padding: 0 16px;
    border-radius: var(--rp-r);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.018em;
    line-height: 1;
    text-transform: none;
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
    transition: background var(--rp-t), color var(--rp-t), border-color var(--rp-t), transform var(--rp-t);
  }

  .reset-password-btn {
    width: 100%;
    max-width: 260px;
    border: 1px solid var(--primary-color);
    background: var(--primary-color);
    color: #ffffff;
  }

  .reset-password-btn:hover {
    background: #ffffff;
    color: var(--primary-color);
    border-color: var(--primary-color);
    transform: translateY(-1px);
  }

  .reset-password-btn-secondary {
    width: 100%;
    max-width: 260px;
    border: 1px solid var(--primary-color);
    background: var(--primary-color);
    color: #ffffff;
  }

  .reset-password-btn-secondary:hover {
    background: #ffffff;
    color: var(--primary-color);
    border-color: var(--primary-color);
    transform: translateY(-1px);
  }

  .reset-password-btn i,
  .reset-password-btn-secondary i,
  .reset-password-btn i::before,
  .reset-password-btn-secondary i::before {
    font-family: "bootstrap-icons" !important;
    font-size: 13px;
    line-height: 1;
  }

  @media (max-width: 1024px) {
    .reset-password-page {
      max-width: 100%;
    }

    .reset-password-card.card {
      padding: 16px;
      margin-bottom: 0;
    }

    .reset-password-title {
      font-size: 18px;
      line-height: 1.1;
    }

    .reset-password-note {
      margin-top: 3px;
      font-size: 11px;
      line-height: 1.45;
    }

    .reset-password-form {
      margin-top: 14px;
      padding-top: 14px;
    }

    .reset-password-row label {
      font-size: 8.5px;
    }

    .password-field-wrap .js-password-input {
      min-height: 32px;
      height: 32px;
      padding-left: 9px !important;
      font-size: 10.5px;
    }

    .reset-password-btn,
    .reset-password-btn-secondary {
      min-height: 31px;
      padding: 0 10px;
      font-size: 10px;
    }
  }

  @media (max-width: 1024px) {
    .reset-password-card.card {
      padding: 12px;
    }

    .reset-password-title {
      font-size: 16px;
      line-height: 1.06;
    }

    .reset-password-note {
      margin-top: 2px;
      font-size: 10.5px;
      line-height: 1.4;
    }

    .reset-password-form {
      margin-top: 10px;
      padding-top: 10px;
    }

    .reset-password-form-grid {
      gap: 7px;
    }

    .reset-password-row {
      gap: 3px;
    }

    .reset-password-row label {
      font-size: 8px;
    }

    .password-field-wrap .js-password-input {
      min-height: 30px;
      height: 30px;
      padding-left: 8px !important;
      padding-right: 38px !important;
      font-size: 10.5px;
    }

    .reset-password-actions {
      width: 100%;
      flex-direction: column;
      align-items: stretch;
      margin-top: 13px;
    }

    .reset-password-btn,
    .reset-password-btn-secondary {
      width: 100%;
      max-width: none;
      min-height: 30px;
      padding: 0 9px;
      font-size: 9.5px;
    }
  }

.reset-password-actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: nowrap;
  margin-top: 28px;
  margin-bottom: 10px;
}

.reset-password-btn,
.reset-password-btn-secondary {
  width: auto;
  min-width: 180px;
  max-width: none;
}
</style>

<div class="reset-password-page">
  <section class="card reset-password-card">
    <h2 class="reset-password-title">Ustaw nowe hasło</h2>
    <p class="reset-password-note">
      Wprowadź nowe hasło do swojego konta i potwierdź zmianę.
    </p>

    <form action="" method="POST" class="reset-password-form">
      <div class="reset-password-form-grid">
        <div class="reset-password-row">
          <label for="password">Nowe hasło</label>
          <div class="password-field-wrap">
            <input
              type="password"
              name="password"
              id="password"
              class="js-password-input"
              placeholder="Wpisz nowe hasło"
              required
            >
            <button type="button" class="password-toggle-btn js-password-toggle" aria-label="Pokaż hasło">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="reset-password-row">
          <label for="confirm_password">Powtórz nowe hasło</label>
          <div class="password-field-wrap">
            <input
              type="password"
              name="confirm_password"
              id="confirm_password"
              class="js-password-input"
              placeholder="Powtórz nowe hasło"
              required
            >
            <button type="button" class="password-toggle-btn js-password-toggle" aria-label="Pokaż hasło">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="reset-password-actions">
        <button type="submit" class="reset-password-btn">
          <i class="bi bi-check2-circle"></i>
          <span>Zapisz nowe hasło</span>
        </button>

        <a href="{{ url_for('admin_login') }}" class="reset-password-btn-secondary">
          <i class="bi bi-box-arrow-in-left"></i>
          <span>Wróć do logowania</span>
        </a>
      </div>
    </form>
  </section>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const toggleButtons = document.querySelectorAll(".js-password-toggle");

  toggleButtons.forEach((button) => {
    button.addEventListener("click", function () {
      const wrap = button.closest(".password-field-wrap");
      if (!wrap) return;

      const input = wrap.querySelector(".js-password-input");
      const icon = button.querySelector("i");
      if (!input || !icon) return;

      const isPassword = input.type === "password";
      input.type = isPassword ? "text" : "password";

      icon.className = isPassword ? "bi bi-eye-slash" : "bi bi-eye";
      button.setAttribute("aria-label", isPassword ? "Ukryj hasło" : "Pokaż hasło");
    });
  });
});
</script>
{% endblock %}
