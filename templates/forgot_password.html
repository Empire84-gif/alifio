{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  :root {
    --fp-bg: #101722;
    --fp-surface: #1a2230;
    --fp-border: rgba(255, 255, 255, 0.20);
    --fp-border-2: rgba(255, 255, 255, 0.28);
    --fp-text: #f4f7fb;
    --fp-text-2: #c7d0dc;
    --fp-t: 0.16s ease;
    --fp-r: 2px;
  }

  .flash-wrapper {
    display: none;
  }

  body {
    background: var(--fp-bg) !important;
  }

  .page-wrap,
  main.container {
    background: transparent !important;
  }

  .forgot-password-page,
  .forgot-password-page * {
    box-sizing: border-box;
    font-family: "LexendDecaLocal", Arial, sans-serif;
  }

  .forgot-password-page {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    color: var(--fp-text);
  }

  .forgot-password-card.card {
    display: grid;
    gap: 0;
    padding: 18px 20px;
    border: 1px solid var(--fp-border-2);
    border-radius: var(--fp-r);
    background: var(--fp-surface) !important;
    box-shadow:
      0 0 56px rgba(255, 255, 255, 0.03),
      0 34px 80px rgba(0, 0, 0, 0.42);
  }

  .forgot-password-title {
    margin: 0;
    color: var(--fp-text);
    font-size: 20px;
    font-weight: 400;
    line-height: 1.14;
    letter-spacing: 0.01em;
  }

  .forgot-password-note {
    margin-top: 4px;
    color: var(--fp-text-2);
    font-size: 12px;
    line-height: 1.5;
    font-weight: 400;
  }

  .forgot-password-form {
    display: grid;
    gap: 0;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--fp-border);
  }

  .forgot-password-form-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .forgot-password-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .forgot-password-row label {
    color: var(--fp-text-2);
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.10em;
    text-transform: uppercase;
  }

  .forgot-password-row input[type="email"] {
    width: 100%;
    min-height: 34px;
    height: 34px;
    padding: 0 10px;
    border: 1px solid rgba(20, 28, 40, 0.16);
    border-radius: var(--fp-r);
    outline: none;
    background: #f4f7fb;
    color: #16202b;
    -webkit-text-fill-color: #16202b;
    font-size: 11px;
    font-weight: 400;
    transition: border-color var(--fp-t), box-shadow var(--fp-t), background var(--fp-t), color var(--fp-t);
  }

  .forgot-password-row input[type="email"]::placeholder {
    color: #7b8794;
    opacity: 1;
  }

  .forgot-password-row input[type="email"]:hover {
    border-color: rgba(20, 28, 40, 0.28);
  }

  .forgot-password-row input[type="email"]:focus {
    background: #ffffff;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 18%, transparent);
  }

  .forgot-password-actions {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .forgot-password-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 32px;
    padding: 0 14px;
    border: 1px solid var(--primary-color);
    border-radius: var(--fp-r);
    background: var(--primary-color);
    color: #ffffff;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.01em;
    line-height: 1;
    text-transform: none;
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
    transition: background var(--fp-t), color var(--fp-t), border-color var(--fp-t), transform var(--fp-t);
  }

  .forgot-password-btn:hover {
    background: #ffffff;
    color: var(--primary-color);
    border-color: var(--primary-color);
    transform: translateY(-1px);
  }

  .forgot-password-actions .forgot-password-btn {
    width: 100%;
    max-width: 240px;
  }

  @media (max-width: 1024px) {
    .forgot-password-page {
      max-width: 100%;
    }

    .forgot-password-card.card {
      padding: 16px;
      margin-bottom: 0;
    }

    .forgot-password-title {
      font-size: 18px;
      line-height: 1.1;
    }

    .forgot-password-note {
      margin-top: 3px;
      font-size: 11px;
      line-height: 1.45;
    }

    .forgot-password-form {
      margin-top: 14px;
      padding-top: 14px;
    }

    .forgot-password-row label {
      font-size: 8.5px;
    }

    .forgot-password-row input[type="email"] {
      min-height: 32px;
      height: 32px;
      padding: 0 9px;
      font-size: 10.5px;
    }

    .forgot-password-btn {
      min-height: 31px;
      padding: 0 10px;
      font-size: 10px;
    }
  }

  @media (max-width: 1024px) {
    .forgot-password-card.card {
      padding: 12px;
    }

    .forgot-password-title {
      font-size: 16px;
      line-height: 1.06;
    }

    .forgot-password-note {
      margin-top: 2px;
      font-size: 10.5px;
      line-height: 1.4;
    }

    .forgot-password-form {
      margin-top: 10px;
      padding-top: 10px;
    }

    .forgot-password-form-grid {
      gap: 7px;
    }

    .forgot-password-row {
      gap: 3px;
    }

    .forgot-password-row label {
      font-size: 8px;
    }

    .forgot-password-row input[type="email"] {
      min-height: 30px;
      height: 30px;
      padding: 0 8px;
      font-size: 10.5px;
    }

    .forgot-password-actions {
      flex-direction: column;
      align-items: stretch;
    }

    .forgot-password-actions .forgot-password-btn {
      width: 100%;
      max-width: none;
    }

    .forgot-password-btn {
      width: 100%;
      min-height: 30px;
      padding: 0 9px;
      font-size: 9.5px;
    }
  }

/* Forgot password — węższy spacing labeli */
.forgot-password-row label {
  letter-spacing: 0.075em !important;
}

/* Forgot password — delikatnie większy spacing reszty tekstu */
.forgot-password-title,
.forgot-password-note,
.forgot-password-row input[type="email"],
.forgot-password-btn {
  letter-spacing: 0.018em !important;
}

/* Forgot password — większy i niżej ustawiony przycisk */
.forgot-password-actions {
  margin-top: 28px !important;
  margin-bottom: 10px;
}

.forgot-password-btn {
  min-height: 34px !important;
  padding: 0 16px !important;
  font-size: 12px !important;
}

.forgot-password-actions .forgot-password-btn {
  max-width: 260px !important;
}

@media (max-width: 1024px) {
  .forgot-password-actions {
    width: 100% !important;
  }

  .forgot-password-actions .forgot-password-btn {
    width: 100% !important;
    max-width: none !important;
    margin-top: -15px;
  }
}
</style>

<div class="forgot-password-page">
  <section class="card forgot-password-card">
    <h2 class="forgot-password-title">Reset hasła administratora</h2>
    <p class="forgot-password-note">
      Podaj e-mail administratora, aby wygenerować link do resetu hasła.
    </p>

    <form action="{{ url_for('forgot_password') }}" method="POST" class="forgot-password-form">
      <div class="forgot-password-form-grid">
        <div class="forgot-password-row">
          <label for="email">E-mail</label>
          <input type="email" name="email" id="email" placeholder="Wpisz adres e-mail" required>
        </div>
      </div>

      <div class="forgot-password-actions">
        <button type="submit" class="forgot-password-btn">Wyślij link resetujący</button>
      </div>
    </form>
  </section>
</div>

{% endblock %}
