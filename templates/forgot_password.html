{% extends "base.html" %}

{% block content %}
<style>
  @font-face {
    font-family: "LexendDecaLocal";
    src: url("{{ url_for('static', filename='fonts/LexendDeca-Regular.ttf') }}") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --fp-bg: #101722;
    --fp-surface: #1a2230;
    --fp-surface-2: #212b3a;
    --fp-surface-3: #2a3547;

    --fp-border: rgba(255, 255, 255, 0.20);
    --fp-border-2: rgba(255, 255, 255, 0.28);
    --fp-border-3: rgba(255, 255, 255, 0.38);

    --fp-text: #f4f7fb;
    --fp-text-2: #dce2eb;
    --fp-text-3: #c7d0dc;
    --fp-text-4: #9da8ba;

    --fp-t: 0.16s ease;
    --fp-r: 2px;
  }

  .flash-wrapper {
    display: none;
  }

  body {
    background: var(--fp-bg) !important;
  }

  .page-wrap,
  main.container {
    background: transparent !important;
  }

  .forgot-password-page,
  .forgot-password-page * {
    box-sizing: border-box;
    font-family: "LexendDecaLocal", Arial, sans-serif;
  }

  .forgot-password-page {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    color: var(--fp-text);
  }

  .forgot-password-card.card {
    display: grid;
    gap: 0;
    padding: 18px 20px;
    border: 1px solid var(--fp-border-2);
    border-radius: var(--fp-r);
    background: var(--fp-surface) !important;
    box-shadow:
      0 0 56px rgba(255, 255, 255, 0.03),
      0 34px 80px rgba(0, 0, 0, 0.42);
  }

  .forgot-password-title {
    margin: 0;
    color: var(--fp-text);
    font-size: 20px;
    font-weight: 400;
    line-height: 1.14;
    letter-spacing: 0.01em;
  }

  .forgot-password-note {
    margin-top: 4px;
    color: var(--fp-text-3);
    font-size: 12px;
    line-height: 1.5;
    font-weight: 400;
  }

  .forgot-password-form {
    display: grid;
    gap: 0;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--fp-border);
  }

  .forgot-password-form-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .forgot-password-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .forgot-password-row label {
    color: var(--fp-text-3);
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.10em;
    text-transform: uppercase;
  }

  .forgot-password-page input[type="email"] {
    width: 100%;
    min-height: 34px;
    height: 34px;
    padding: 0 10px;
    border: 1px solid var(--fp-border-2);
    border-radius: var(--fp-r);
    background: var(--fp-surface-3) !important;
    color: var(--fp-text) !important;
    font-size: 11px;
    font-weight: 400;
    transition: border-color var(--fp-t), box-shadow var(--fp-t), background var(--fp-t);
  }

  .forgot-password-page input[type="email"]::placeholder {
    color: var(--fp-text-4);
    opacity: 1;
  }

  .forgot-password-page input[type="email"]:hover {
    border-color: var(--fp-border-3);
  }

  .forgot-password-page input[type="email"]:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 18%, transparent);
  }

  .forgot-password-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 32px;
    padding: 0 12px;
    border: 1px solid var(--primary-color);
    border-radius: var(--fp-r);
    background: var(--primary-color);
    color: #ffffff;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.01em;
    line-height: 1;
    text-transform: none;
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
    transition: background var(--fp-t), color var(--fp-t), border-color var(--fp-t), transform var(--fp-t), opacity var(--fp-t);
  }

  .forgot-password-btn:hover {
    background: transparent;
    color: var(--fp-text);
    border-color: var(--primary-color);
    transform: translateY(-1px);
  }

  .forgot-password-actions {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .forgot-password-actions .forgot-password-btn {
    width: 100%;
    max-width: 240px;
  }

  @media (max-width: 1023px) {
    .forgot-password-page {
      max-width: 100%;
    }

    .forgot-password-card.card {
      padding: 16px;
      border-radius: var(--fp-r);
      margin-bottom: 0;
    }

    .forgot-password-title {
      font-size: 18px;
      line-height: 1.1;
    }

    .forgot-password-note {
      margin-top: 3px;
      font-size: 11px;
      line-height: 1.45;
    }

    .forgot-password-form {
      margin-top: 14px;
      padding-top: 14px;
    }

    .forgot-password-row label {
      font-size: 8.5px;
    }

    .forgot-password-page input[type="email"] {
      min-height: 32px;
      height: 32px;
      padding: 0 9px;
      font-size: 10.5px;
    }

    .forgot-password-btn {
      min-height: 31px;
      padding: 0 10px;
      font-size: 10px;
    }
  }

  @media (max-width: 640px) {
    .forgot-password-card.card {
      padding: 12px;
      border-radius: var(--fp-r);
    }

    .forgot-password-title {
      font-size: 16px;
      line-height: 1.06;
    }

    .forgot-password-note {
      margin-top: 2px;
      font-size: 10.5px;
      line-height: 1.4;
    }

    .forgot-password-form {
      margin-top: 10px;
      padding-top: 10px;
    }

    .forgot-password-form-grid {
      gap: 7px;
    }

    .forgot-password-row {
      gap: 3px;
    }

    .forgot-password-row label {
      font-size: 8px;
    }

    .forgot-password-page input[type="email"] {
      min-height: 30px;
      height: 30px;
      padding: 0 8px;
      font-size: 10.5px;
    }

    .forgot-password-actions {
      flex-direction: column;
      align-items: stretch;
    }

    .forgot-password-actions .forgot-password-btn {
      width: 100%;
      max-width: none;
    }

    .forgot-password-btn {
      width: 100%;
      min-height: 30px;
      padding: 0 9px;
      font-size: 9.5px;
    }
  }

  @media (max-width: 380px) {
    .forgot-password-card.card {
      padding: 10px;
    }

    .forgot-password-title {
      font-size: 15px;
    }

    .forgot-password-note {
      font-size: 10px;
    }

    .forgot-password-page input[type="email"] {
      min-height: 29px;
      height: 29px;
      padding: 0 7px;
      font-size: 10px;
    }

    .forgot-password-btn {
      min-height: 29px;
      padding: 0 8px;
      font-size: 9px;
    }
  }
</style>

<div class="forgot-password-page">
  <section class="card forgot-password-card">
    <h2 class="forgot-password-title">Reset hasła administratora</h2>
    <p class="forgot-password-note">
      Podaj e-mail administratora, aby wygenerować link do resetu hasła.
    </p>

    <form action="{{ url_for('forgot_password') }}" method="POST" class="forgot-password-form">
      <div class="forgot-password-form-grid">
        <div class="forgot-password-row">
          <label for="email">E-mail</label>
          <input type="email" name="email" id="email" required>
        </div>
      </div>

      <div class="forgot-password-actions">
        <button type="submit" class="forgot-password-btn">Wyślij link resetujący</button>
      </div>
    </form>
  </section>
</div>

{% endblock %}
