{% extends "base.html" %}

{% block content %}
<style>
  @font-face {
    font-family: "RobotoLocal";
    src: url("{{ url_for('static', filename='fonts/Roboto-Regular.ttf') }}") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --cp-bg: #101722;
    --cp-surface: #1a2230;
    --cp-surface-2: #212b3a;
    --cp-surface-3: #2a3547;

    --cp-border: rgba(255, 255, 255, 0.20);
    --cp-border-2: rgba(255, 255, 255, 0.28);
    --cp-border-3: rgba(255, 255, 255, 0.38);

    --cp-text: #f4f7fb;
    --cp-text-2: #f8f8f8;
    --cp-text-3: #e9ebec;
    --cp-text-4: #ffffff;

    --cp-t: 0.16s ease;
    --cp-r: 2px;
  }

  .flash-wrapper {
    display: none;
  }

  body {
    background: var(--cp-bg) !important;
  }

  .page-wrap,
  main.container {
    background: transparent !important;
  }

  .change-password-page,
  .change-password-page * {
    box-sizing: border-box;
    font-family: "RobotoLocal", Arial, sans-serif;
  }

  .change-password-page {
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    color: var(--cp-text);
  }

  .change-password-card.card {
    display: grid;
    gap: 0;
    padding: 18px 20px;
    background: var(--cp-surface) !important;
    border: 1px solid var(--cp-border-2) !important;
    border-radius: var(--cp-r);
    box-shadow:
      0 0 56px rgba(255, 255, 255, 0.03),
      0 34px 80px rgba(0, 0, 0, 0.42);
  }

  .change-password-title {
    margin: 0;
    font-size: 21px;
    font-weight: 400;
    line-height: 1.14;
    letter-spacing: 0.01em;
    color: var(--cp-text);
  }

  .change-password-note {
    margin-top: 4px;
    color: var(--cp-text-3);
    font-size: 12.6px;
    line-height: 1.5;
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  .change-password-form {
    display: grid;
    gap: 0;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--cp-border);
  }

  .change-password-form-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .change-password-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .change-password-row label {
    font-size: 9.45px;
    font-weight: 400;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--cp-text-3);
  }

  .change-password-page input {
    width: 100%;
    min-height: 34px;
    height: 34px;
    padding: 0 10px;
    font-size: 11.55px;
    font-weight: 400;
    border-radius: var(--cp-r);
    background: var(--cp-surface-3) !important;
    color: var(--cp-text) !important;
    border: 1px solid var(--cp-border-2) !important;
    transition: border-color var(--cp-t), box-shadow var(--cp-t), background var(--cp-t);
  }

  .change-password-page input::placeholder {
    color: var(--cp-text-4);
    opacity: 1;
  }

  .change-password-page input:hover {
    border-color: var(--cp-border-3) !important;
  }

  .change-password-page input:focus {
    outline: none;
    border-color: var(--primary-color) !important;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 18%, transparent);
  }

  .change-password-btn,
  .change-password-btn-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 32px;
    padding: 0 12px;
    border-radius: var(--cp-r);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.01em;
    line-height: 1;
    text-transform: none;
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
    transition: background var(--cp-t), color var(--cp-t), border-color var(--cp-t), transform var(--cp-t), opacity var(--cp-t);
  }

  .change-password-btn {
    border: 1px solid var(--primary-color);
    background: var(--primary-color);
    color: #ffffff;
  }

  .change-password-btn:hover {
    background: transparent;
    color: var(--cp-text);
    border-color: var(--primary-color);
    transform: translateY(-1px);
  }

  .change-password-btn-secondary {
    border: 1px solid var(--cp-border-2);
    background: var(--cp-surface-3);
    color: var(--cp-text-2);
  }

  .change-password-btn-secondary:hover {
    border-color: var(--primary-color);
    background: transparent;
    color: var(--cp-text);
    transform: translateY(-1px);
  }

  .change-password-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .change-password-actions .change-password-btn,
  .change-password-actions .change-password-btn-secondary {
    width: auto;
    min-width: 180px;
  }

  @media (max-width: 1023px) {
    .change-password-page {
      max-width: 100%;
    }

    .change-password-card.card {
      padding: 16px;
      border-radius: var(--cp-r);
      margin-bottom: 0;
    }

    .change-password-title {
      font-size: 18.9px;
      line-height: 1.1;
    }

    .change-password-note {
      font-size: 11.55px;
      line-height: 1.45;
      margin-top: 3px;
    }

    .change-password-form {
      margin-top: 14px;
      padding-top: 14px;
    }

    .change-password-page input {
      min-height: 32px;
      height: 32px;
      padding: 0 9px;
      font-size: 11.025px;
    }

    .change-password-btn,
    .change-password-btn-secondary {
      font-size: 10.5px;
      min-height: 31px;
      padding: 0 10px;
    }
  }

  @media (max-width: 640px) {
    .change-password-card.card {
      padding: 12px;
      border-radius: var(--cp-r);
    }

    .change-password-title {
      font-size: 16.8px;
      line-height: 1.06;
    }

    .change-password-note {
      font-size: 11.025px;
      line-height: 1.4;
      margin-top: 2px;
    }

    .change-password-form {
      margin-top: 10px;
      padding-top: 10px;
    }

    .change-password-form-grid {
      gap: 7px;
    }

    .change-password-row {
      gap: 3px;
    }

    .change-password-row label {
      font-size: 8.925px;
    }

    .change-password-page input {
      min-height: 30px;
      height: 30px;
      padding: 0 8px;
      font-size: 11.025px;
    }

    .change-password-actions {
      flex-direction: column;
      align-items: stretch;
    }

    .change-password-actions .change-password-btn,
    .change-password-actions .change-password-btn-secondary {
      width: 100%;
      min-width: 0;
    }

    .change-password-btn,
    .change-password-btn-secondary {
      width: 100%;
      min-height: 30px;
      font-size: 9.975px;
      padding: 0 9px;
    }
  }

  @media (max-width: 380px) {
    .change-password-card.card {
      padding: 10px;
    }

    .change-password-title {
      font-size: 15.75px;
    }

    .change-password-note {
      font-size: 10.5px;
    }

    .change-password-page input {
      min-height: 29px;
      height: 29px;
      padding: 0 7px;
      font-size: 10.5px;
    }

    .change-password-btn,
    .change-password-btn-secondary {
      min-height: 29px;
      font-size: 9.45px;
      padding: 0 8px;
    }
  }

  @font-face {
  font-family: "LexendDecaLocal";
  src: url("{{ url_for('static', filename='fonts/LexendDeca-Regular.ttf') }}") format("truetype");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

/* ========================================
   CHANGE PASSWORD — PRZYCISKI W STAREJ CZCIONCE
======================================== */

.change-password-btn,
.change-password-btn-secondary,
.change-password-btn *,
.change-password-btn-secondary * {
  font-family: "LexendDecaLocal", Arial, sans-serif !important;
}
</style>

<div class="change-password-page">
  <section class="card change-password-card">
    <h2 class="change-password-title">Zmiana hasła administratora</h2>
    <p class="change-password-note">
      Wprowadź obecne hasło, a następnie ustaw nowe hasło do panelu administratora.
    </p>

    <form action="{{ url_for('admin_change_password') }}" method="POST" class="change-password-form">
      <div class="change-password-form-grid">
        <div class="change-password-row">
          <label for="current_password">Obecne hasło</label>
          <input type="password" name="current_password" id="current_password" required>
        </div>

        <div class="change-password-row">
          <label for="new_password">Nowe hasło</label>
          <input type="password" name="new_password" id="new_password" required>
        </div>

        <div class="change-password-row">
          <label for="confirm_new_password">Powtórz nowe hasło</label>
          <input type="password" name="confirm_new_password" id="confirm_new_password" required>
        </div>
      </div>

      <div class="change-password-actions">
        <button type="submit" class="change-password-btn">Zmień hasło</button>
        <a href="{{ url_for('admin_settings') }}" class="change-password-btn-secondary">Wróć do ustawień</a>
      </div>
    </form>
  </section>
</div>
{% endblock %}
