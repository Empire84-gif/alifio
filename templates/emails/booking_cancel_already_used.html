<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link został już użyty</title>

  <style>
    @font-face {
      font-family: "LexendDecaLocal";
      src: url("{{ url_for('static', filename='fonts/LexendDeca-Regular.ttf') }}") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: fallback;
    }

    body {
      margin: 0;
      padding: 0;
      background: #f5f7fb;
      color: #18212f;
      font-family: "LexendDecaLocal", Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: #ffffff;
      border: 1px solid #e3e8f0;
      border-radius: 14px;
      padding: 34px 28px;
      box-sizing: border-box;
      text-align: center;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
    }

    .eyebrow {
      margin-bottom: 14px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #7a8798;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 30px;
      line-height: 1.2;
      font-weight: 400;
      color: #132033;
    }

    p {
      margin: 0 0 16px;
      font-size: 15px;
      line-height: 1.75;
      color: #334155;
    }

    .actions {
      margin-top: 24px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 22px;
      border-radius: 10px;
      border: 1px solid #1f4ed8;
      background: #1f4ed8;
      color: #ffffff;
      text-decoration: none;
      font-size: 14px;
      line-height: 1.2;
      transition: 0.18s ease;
    }

    .btn:hover {
      background: #ffffff;
      color: #1f4ed8;
    }

    @media (max-width: 640px) {
      .card {
        padding: 26px 18px;
      }

      h1 {
        font-size: 25px;
      }

      .actions .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="eyebrow">Anulowanie rezerwacji</div>

      <h1>Ten link został już wykorzystany</h1>

      <p>
        Rezerwacja została już wcześniej anulowana albo link anulacyjny nie jest już aktywny.
      </p>

      <p>
        Jeśli chcesz umówić nowy termin, możesz wrócić do systemu rezerwacji i wybrać nową wizytę.
      </p>

      <div class="actions">
        <a href="{{ url_for('booking') }}" class="btn">Wróć do rezerwacji</a>
      </div>
    </div>
  </div>
</body>
</html>
