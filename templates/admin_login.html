{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  :root {
    --lg-bg: #101722;
    --lg-surface: #1a2230;
    --lg-surface-2: #212b3a;
    --lg-surface-3: #2a3547;

    --font-main: "LexendDecaLocal", Arial, sans-serif;

    --lg-border: rgba(255, 255, 255, 0.20);
    --lg-border-2: rgba(255, 255, 255, 0.28);
    --lg-border-3: rgba(255, 255, 255, 0.38);

    --lg-text: #f4f7fb;
    --lg-text-2: #dce2eb;
    --lg-text-3: #c7d0dc;
    --lg-text-4: #9da8ba;

    --lg-input-bg: #f4f7fb;
    --lg-input-bg-focus: #ffffff;
    --lg-input-text: #16202b;
    --lg-input-placeholder: #7b8794;
    --lg-input-border: rgba(20, 28, 40, 0.16);
    --lg-input-border-hover: rgba(20, 28, 40, 0.28);

    --lg-t: 0.16s ease;
    --lg-r: 2px;
  }

  .flash-wrapper {
    display: none;
  }

  body {
    background: var(--lg-bg) !important;
  }

  .page-wrap,
  main.container {
    background: transparent !important;
  }

  .login-page,
  .login-page * {
    box-sizing: border-box;
    font-family: "LexendDecaLocal", Arial, sans-serif;
  }

  .login-page {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    color: var(--lg-text);
  }

  .login-card.card {
    display: grid;
    gap: 0;
    padding: 18px 20px;
    border: 1px solid var(--lg-border-2);
    border-radius: var(--lg-r);
    background: var(--lg-surface) !important;
    box-shadow:
      0 0 56px rgba(255, 255, 255, 0.03),
      0 34px 80px rgba(0, 0, 0, 0.42);
  }

  .login-title {
    margin: 0;
    color: var(--lg-text);
    font-size: 20px;
    font-weight: 400;
    line-height: 1.14;
    letter-spacing: 0.01em;
  }

  .login-note {
    margin-top: 4px;
    color: var(--lg-text-3);
    font-size: 12px;
    line-height: 1.5;
    font-weight: 400;
  }

  .login-form {
    display: grid;
    gap: 0;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--lg-border);
  }

  .login-form-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .login-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .login-row label {
    color: var(--lg-text-3);
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.10em;
    text-transform: uppercase;
  }

  .login-page input[type="email"],
  .password-field-wrap .js-password-input {
    display: block;
    width: 100%;
    min-width: 0;
    height: 34px;
    min-height: 34px;
    box-sizing: border-box;
    border: 1px solid var(--lg-input-border);
    border-radius: var(--lg-r);
    outline: none;
    background: var(--lg-input-bg) !important;
    color: var(--lg-input-text) !important;
    -webkit-text-fill-color: var(--lg-input-text) !important;
    font-size: 11px;
    font-weight: 400;
    line-height: 1;
    font-family: "LexendDecaLocal", Arial, sans-serif;
    transition:
      border-color var(--lg-t),
      box-shadow var(--lg-t),
      background var(--lg-t),
      color var(--lg-t);
    appearance: none;
    -webkit-appearance: none;
  }

  .login-page input[type="email"] {
    padding: 0 10px;
  }

  .password-field-wrap {
    position: relative;
    width: 100%;
    min-width: 0;
  }

  .password-field-wrap .js-password-input {
    padding: 0 42px 0 10px;
  }

  .login-page input[type="email"]::placeholder,
  .password-field-wrap .js-password-input::placeholder {
    color: var(--lg-input-placeholder) !important;
    opacity: 1;
  }

  .login-page input[type="email"]:hover,
  .password-field-wrap .js-password-input:hover {
    border-color: var(--lg-input-border-hover);
  }

  .login-page input[type="email"]:focus,
  .password-field-wrap .js-password-input:focus {
    background: var(--lg-input-bg-focus) !important;
    border-color: var(--primary-color) !important;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 18%, transparent) !important;
  }

  .login-page input[type="email"]:-webkit-autofill,
  .login-page input[type="email"]:-webkit-autofill:hover,
  .login-page input[type="email"]:-webkit-autofill:focus,
  .password-field-wrap .js-password-input:-webkit-autofill,
  .password-field-wrap .js-password-input:-webkit-autofill:hover,
  .password-field-wrap .js-password-input:-webkit-autofill:focus {
    -webkit-text-fill-color: var(--lg-input-text) !important;
    box-shadow: 0 0 0 1000px var(--lg-input-bg) inset !important;
    transition: background-color 9999s ease-in-out 0s;
    caret-color: var(--lg-input-text);
  }

  .password-toggle-btn {
    position: absolute;
    top: 50%;
    right: 10px;
    transform: translateY(-50%);
    width: 26px;
    height: 26px;
    padding: 0;
    border: none;
    background: transparent;
    color: #556476;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: color var(--lg-t), opacity var(--lg-t);
  }

  .password-toggle-btn:hover {
    color: #16202b;
  }

  .password-toggle-btn:focus {
    outline: none;
    color: var(--primary-color);
  }

  .password-toggle-btn i {
    line-height: 1;
    display: block;
  }

  .login-checkbox-row {
    margin-top: 2px;
  }

  .login-checkbox {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    width: fit-content;
    cursor: pointer;
  }

  .login-checkbox input[type="checkbox"] {
    width: 16px !important;
    height: 16px !important;
    min-height: unset !important;
    margin: 0 !important;
    padding: 0 !important;
    border: none !important;
    border-radius: 0 !important;
    background: transparent !important;
    box-shadow: none !important;
    appearance: auto !important;
    -webkit-appearance: checkbox !important;
    accent-color: var(--primary-color);
    cursor: pointer;
    flex-shrink: 0;
  }

  .login-checkbox span {
    color: var(--lg-text-2);
    font-size: 11px;
    font-weight: 400;
    line-height: 1.3;
    letter-spacing: 0;
    text-transform: none;
  }

  .login-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 32px;
    padding: 0 12px;
    border: 1px solid var(--primary-color);
    border-radius: var(--lg-r);
    background: var(--primary-color);
    color: #ffffff;
    font-size: 12px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: 0.01em;
    text-transform: none;
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
    padding-bottom: 2.3px;
    transition:
      background var(--lg-t),
      color var(--lg-t),
      border-color var(--lg-t),
      transform var(--lg-t),
      opacity var(--lg-t);
  }

  .login-btn:hover {
    border-color: var(--primary-color);
    background: transparent;
    color: var(--lg-text);
    transform: translateY(-1px);
  }

  .login-actions {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .login-actions .login-btn {
    width: auto;
    min-width: 180px;
  }

  .login-links {
    margin-top: 14px;
  }

  .login-links a {
    color: var(--primary-color);
    font-size: 12px;
    font-weight: 400;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color var(--lg-t), border-color var(--lg-t);
  }

  .login-links a:hover {
    border-bottom-color: var(--primary-color);
  }

  @media (max-width: 1024px) {
    .login-page {
      max-width: 100%;
    }

    .login-card.card {
      margin-bottom: 0;
      padding: 16px;
      border-radius: var(--lg-r);
    }

    .login-title {
      font-size: 18px;
      line-height: 1.1;
    }

    .login-note {
      margin-top: 3px;
      font-size: 11px;
      line-height: 1.45;
    }

    .login-form {
      margin-top: 14px;
      padding-top: 14px;
    }

    .login-row {
      gap: 4px;
    }

    .login-row label {
      font-size: 8.5px;
    }

    .login-page input[type="email"],
    .password-field-wrap .js-password-input {
      height: 32px;
      min-height: 32px;
      font-size: 10.5px;
    }

    .login-page input[type="email"] {
      padding: 0 9px;
    }

    .password-field-wrap .js-password-input {
      padding: 0 40px 0 9px;
    }

    .login-btn {
      min-height: 31px;
      padding: 0 10px;
      font-size: 10px;
    }
  }

  @media (max-width: 1024px) {
    .login-card.card {
      padding: 12px;
      border-radius: var(--lg-r);
    }

    .login-title {
      font-size: 16px;
      line-height: 1.06;
    }

    .login-note {
      margin-top: 2px;
      font-size: 10.5px;
      line-height: 1.4;
    }

    .login-form {
      margin-top: 10px;
      padding-top: 10px;
    }

    .login-form-grid {
      gap: 7px;
    }

    .login-row {
      gap: 3px;
    }

    .login-row label {
      font-size: 8px;
    }

    .login-page input[type="email"],
    .password-field-wrap .js-password-input {
      height: 30px;
      min-height: 30px;
      font-size: 10.5px;
    }

    .login-page input[type="email"] {
      padding: 0 8px;
    }

    .password-field-wrap .js-password-input {
      padding: 0 38px 0 8px;
    }

    .login-checkbox span {
      font-size: 10.5px;
    }

    .login-actions {
      flex-direction: column;
      align-items: stretch;
    }

    .login-actions .login-btn {
      width: 100%;
      min-width: 0;
    }

    .login-btn {
      width: 100%;
      min-height: 30px;
      padding: 0 9px;
      font-size: 9.5px;
    }

    .login-links a {
      font-size: 11px;
    }
  }

 /* Login — węższy spacing labeli/opisów pól */
.login-row label {
  letter-spacing: 0.04em !important;
}

/* Login — delikatnie większy spacing reszty tekstu */
.login-title,
.login-note,
.login-page input[type="email"],
.password-field-wrap .js-password-input,
.login-checkbox span,
.login-btn,
.login-links a {
  letter-spacing: 0.025em !important;
} 
</style>

<div class="login-page">
  <section class="card login-card">
    <h2 class="login-title">Logowanie administratora</h2>
    <p class="login-note">Zaloguj się do panelu zarządzania.</p>

    <form action="{{ url_for('admin_login') }}" method="POST" class="login-form">
      <div class="login-form-grid">
        <div class="login-row">
          <label for="email">E-mail</label>
          <input type="email" name="email" id="email" required>
        </div>

        <div class="login-row">
  <label for="password">Hasło</label>
  <div class="password-field-wrap">
    <input
      type="password"
      name="password"
      id="password"
      class="js-password-input"
      placeholder="Wpisz hasło"
      required
    >
    <button type="button" class="password-toggle-btn js-password-toggle" aria-label="Pokaż hasło">
      <i class="bi bi-eye"></i>
    </button>
  </div>
</div>

        <div class="login-row login-checkbox-row">
          <label class="login-checkbox">
            <input type="checkbox" name="remember_me" value="1">
            <span>Pozostań zalogowany</span>
          </label>
        </div>
      </div>

      <div class="login-actions">
        <button type="submit" class="login-btn">Zaloguj się</button>
      </div>
    </form>

    <div class="login-links">
      <a href="{{ url_for('forgot_password') }}">Nie pamiętasz hasła?</a>
    </div>
  </section>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const toggleButtons = document.querySelectorAll(".js-password-toggle");

  toggleButtons.forEach((button) => {
    button.addEventListener("click", function () {
      const wrap = button.closest(".password-field-wrap");
      if (!wrap) return;

      const input = wrap.querySelector(".js-password-input");
      const icon = button.querySelector("i");
      if (!input || !icon) return;

      const isPassword = input.type === "password";
      input.type = isPassword ? "text" : "password";

      icon.className = isPassword ? "bi bi-eye-slash" : "bi bi-eye";
      button.setAttribute("aria-label", isPassword ? "Ukryj hasło" : "Pokaż hasło");
    });
  });
});
</script>
{% endblock %}
