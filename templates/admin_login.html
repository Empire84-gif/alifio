{% extends "base.html" %}

{% block content %}
<style>
  @font-face {
    font-family: "LexendDecaLocal";
    src: url("{{ url_for('static', filename='fonts/LexendDeca-Regular.ttf') }}") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --lg-bg: #101722;
    --lg-surface: #1a2230;
    --lg-surface-2: #212b3a;
    --lg-surface-3: #2a3547;

    --font-main: "LexendDecaLocal", Arial, sans-serif;

    --lg-border: rgba(255, 255, 255, 0.20);
    --lg-border-2: rgba(255, 255, 255, 0.28);
    --lg-border-3: rgba(255, 255, 255, 0.38);

    --lg-text: #f4f7fb;
    --lg-text-2: #dce2eb;
    --lg-text-3: #c7d0dc;
    --lg-text-4: #9da8ba;

    --lg-t: 0.16s ease;
    --lg-r: 2px;
  }

  .flash-wrapper {
    display: none;
  }

  body {
    background: var(--lg-bg) !important;
  }

  .page-wrap,
  main.container {
    background: transparent !important;
  }

  

  .login-page,
  .login-page * {
    box-sizing: border-box;
    font-family: "LexendDecaLocal", Arial, sans-serif;
  }

  .login-page {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    color: var(--lg-text);
  }

  .login-card.card {
    display: grid;
    gap: 0;
    padding: 18px 20px;
    border: 1px solid var(--lg-border-2);
    border-radius: var(--lg-r);
    background: var(--lg-surface) !important;
    box-shadow:
      0 0 56px rgba(255, 255, 255, 0.03),
      0 34px 80px rgba(0, 0, 0, 0.42);
  }

  .login-title {
    margin: 0;
    color: var(--lg-text);
    font-size: 20px;
    font-weight: 400;
    line-height: 1.14;
    letter-spacing: 0.01em;
  }

  .login-note {
    margin-top: 4px;
    color: var(--lg-text-3);
    font-size: 12px;
    line-height: 1.5;
    font-weight: 400;
  }

  .login-form {
    display: grid;
    gap: 0;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--lg-border);
  }

  .login-form-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .login-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .login-row label {
    color: var(--lg-text-3);
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.10em;
    text-transform: uppercase;
  }

  .login-page input[type="email"],
  .login-page input[type="password"] {
    width: 100%;
    height: 34px;
    min-height: 34px;
    padding: 0 10px;
    border: 1px solid var(--lg-border-2);
    border-radius: var(--lg-r);
    outline: none;
    background: var(--lg-surface-3) !important;
    color: var(--lg-text) !important;
    font-size: 11px;
    font-weight: 400;
    transition: border-color var(--lg-t), box-shadow var(--lg-t), background var(--lg-t);
  }

  .login-page input[type="email"]::placeholder,
  .login-page input[type="password"]::placeholder {
    color: var(--lg-text-4);
    opacity: 1;
  }

  .login-page input[type="email"]:hover,
  .login-page input[type="password"]:hover {
    border-color: var(--lg-border-3);
  }

  .login-page input[type="email"]:focus,
  .login-page input[type="password"]:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 18%, transparent);
  }

  .login-checkbox-row {
    margin-top: 2px;
  }

  .login-checkbox {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    width: fit-content;
    cursor: pointer;
  }

  .login-checkbox input[type="checkbox"] {
    width: 16px !important;
    height: 16px !important;
    min-height: unset !important;
    margin: 0 !important;
    padding: 0 !important;
    border: none !important;
    border-radius: 0 !important;
    background: transparent !important;
    box-shadow: none !important;
    appearance: auto !important;
    -webkit-appearance: checkbox !important;
    accent-color: var(--primary-color);
    cursor: pointer;
    flex-shrink: 0;
  }

  .login-checkbox span {
    color: var(--lg-text-2);
    font-size: 11px;
    font-weight: 400;
    line-height: 1.3;
    letter-spacing: 0;
    text-transform: none;
  }

  .login-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 32px;
    padding: 0 12px;
    border: 1px solid var(--primary-color);
    border-radius: var(--lg-r);
    background: var(--primary-color);
    color: #ffffff;
    font-size: 12px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: 0.01em;
    text-transform: none;
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
    transition: background var(--lg-t), color var(--lg-t), border-color var(--lg-t), transform var(--lg-t), opacity var(--lg-t);
  }

  .login-btn:hover {
    border-color: var(--primary-color);
    background: transparent;
    color: var(--lg-text);
    transform: translateY(-1px);
  }

  .login-actions {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .login-actions .login-btn {
    width: auto;
    min-width: 180px;
  }

  .login-links {
    margin-top: 14px;
  }

  .login-links a {
    color: var(--primary-color);
    font-size: 12px;
    font-weight: 400;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color var(--lg-t), border-color var(--lg-t);
  }

  .login-links a:hover {
    border-bottom-color: var(--primary-color);
  }

  @media (max-width: 1023px) {
    .login-page {
      max-width: 100%;
    }

    .login-card.card {
      margin-bottom: 0;
      padding: 16px;
      border-radius: var(--lg-r);
    }

    .login-title {
      font-size: 18px;
      line-height: 1.1;
    }

    .login-note {
      margin-top: 3px;
      font-size: 11px;
      line-height: 1.45;
    }

    .login-form {
      margin-top: 14px;
      padding-top: 14px;
    }

    .login-row {
      gap: 4px;
    }

    .login-row label {
      font-size: 8.5px;
    }

    .login-page input[type="email"],
    .login-page input[type="password"] {
      height: 32px;
      min-height: 32px;
      padding: 0 9px;
      font-size: 10.5px;
    }

    .login-btn {
      min-height: 31px;
      padding: 0 10px;
      font-size: 10px;
    }
  }

  @media (max-width: 640px) {
    .login-card.card {
      padding: 12px;
      border-radius: var(--lg-r);
    }

    .login-title {
      font-size: 16px;
      line-height: 1.06;
    }

    .login-note {
      margin-top: 2px;
      font-size: 10.5px;
      line-height: 1.4;
    }

    .login-form {
      margin-top: 10px;
      padding-top: 10px;
    }

    .login-form-grid {
      gap: 7px;
    }

    .login-row {
      gap: 3px;
    }

    .login-row label {
      font-size: 8px;
    }

    .login-page input[type="email"],
    .login-page input[type="password"] {
      height: 30px;
      min-height: 30px;
      padding: 0 8px;
      font-size: 10.5px;
    }

    .login-checkbox span {
      font-size: 10.5px;
    }

    .login-actions {
      flex-direction: column;
      align-items: stretch;
    }

    .login-actions .login-btn {
      width: 100%;
      min-width: 0;
    }

    .login-btn {
      width: 100%;
      min-height: 30px;
      padding: 0 9px;
      font-size: 9.5px;
    }

    .login-links a {
      font-size: 11px;
    }
  }

  @media (max-width: 380px) {
    .login-card.card {
      padding: 10px;
    }

    .login-title {
      font-size: 15px;
    }

    .login-note {
      font-size: 10px;
    }

    .login-page input[type="email"],
    .login-page input[type="password"] {
      height: 29px;
      min-height: 29px;
      padding: 0 7px;
      font-size: 10px;
    }

    .login-btn {
      min-height: 29px;
      padding: 0 8px;
      font-size: 9px;
    }
  }
</style>

<div class="login-page">
  <section class="card login-card">
    <h2 class="login-title">Logowanie administratora</h2>
    <p class="login-note">Zaloguj się do panelu zarządzania.</p>

    <form action="{{ url_for('admin_login') }}" method="POST" class="login-form">
      <div class="login-form-grid">
        <div class="login-row">
          <label for="email">E-mail</label>
          <input type="email" name="email" id="email" required>
        </div>

        <div class="login-row">
          <label for="password">Hasło</label>
          <input type="password" name="password" id="password" required>
        </div>

        <div class="login-row login-checkbox-row">
          <label class="login-checkbox">
            <input type="checkbox" name="remember_me" value="1">
            <span>Pozostań zalogowany</span>
          </label>
        </div>
      </div>

      <div class="login-actions">
        <button type="submit" class="login-btn">Zaloguj się</button>
      </div>
    </form>

    <div class="login-links">
      <a href="{{ url_for('forgot_password') }}">Nie pamiętasz hasła?</a>
    </div>
  </section>
</div>

{% endblock %}
