{% extends "base.html" %}

{% block content %}
<style>
  @font-face {
    font-family: 'LexendDecaLocal';
    src: url("{{ url_for('static', filename='fonts/LexendDeca-Regular.ttf') }}") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  .flash-wrapper {
    display: none;
  }

  .register-page,
  .register-page * {
    box-sizing: border-box;
    font-family: 'LexendDecaLocal', Arial, sans-serif;
  }

  .register-page {
    --rg-bg: #151a21;
    --rg-surface: #1b212b;
    --rg-surface-2: #222936;
    --rg-surface-3: #2a3342;
    --rg-border: rgba(255,255,255,0.10);
    --rg-border-2: rgba(255,255,255,0.14);
    --rg-border-3: rgba(255,255,255,0.20);
    --rg-text: #f4f7fb;
    --rg-text-2: #dce2eb;
    --rg-text-3: #c2cad7;
    --rg-text-4: #9ba6b8;
    --rg-t: 0.16s ease;

    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    color: var(--rg-text);
  }

  body {
    background: #252c35;
  }

  .register-card.card {
    display: grid;
    gap: 0;
    padding: 0;
    overflow: hidden;
    background: var(--rg-surface);
    border: 1px solid var(--rg-border-2);
    border-radius: 2px;
    box-shadow:
      0 0 56px rgba(255,255,255,0.03),
      0 34px 80px rgba(0,0,0,0.42);
  }

  .register-header {
    padding: 20px 22px 16px;
    background: var(--rg-surface-2);
    border-bottom: 1px solid var(--rg-border-2);
  }

  .register-title {
    margin: 0;
    color: var(--rg-text);
    font-size: 22px;
    font-weight: 400;
    line-height: 1.12;
    letter-spacing: 0.01em;
  }

  .register-note {
    margin: 6px 0 0 0;
    color: var(--rg-text-3);
    font-size: 12px;
    line-height: 1.5;
  }

  .register-body {
    padding: 18px 22px 22px;
    background: var(--rg-surface);
  }

  .register-form {
    display: grid;
    gap: 14px;
  }

  .register-form-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .register-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 0;
  }

  .register-row label {
    color: var(--rg-text-4);
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .register-page input[type="text"],
  .register-page input[type="email"],
  .register-page input[type="password"] {
    width: 100%;
    min-width: 0;
    height: 34px;
    min-height: 34px;
    padding: 0 10px;
    border-radius: 2px;
    border: 1px solid var(--rg-border-2);
    background: var(--rg-surface-3);
    color: var(--rg-text);
    font-size: 11px;
    font-weight: 400;
    transition: border-color var(--rg-t), box-shadow var(--rg-t), background var(--rg-t);
  }

  .register-page input[type="text"]::placeholder,
  .register-page input[type="email"]::placeholder,
  .register-page input[type="password"]::placeholder {
    color: var(--rg-text-4);
    opacity: 1;
  }

  .register-page input[type="text"]:hover,
  .register-page input[type="email"]:hover,
  .register-page input[type="password"]:hover {
    border-color: var(--rg-border-3);
  }

  .register-page input[type="text"]:focus,
  .register-page input[type="email"]:focus,
  .register-page input[type="password"]:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary-color) 18%, transparent);
  }

  .register-actions {
    display: flex;
    justify-content: stretch;
    align-items: center;
    gap: 8px;
    margin-top: 2px;
  }

  .register-btn {
    width: 100%;
    min-width: 0;
    height: 32px;
    min-height: 32px;
    padding: 0 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
    border: 1px solid var(--primary-color);
    background: var(--primary-color);
    color: #ffffff;
    font-size: 11px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: 0.01em;
    text-decoration: none;
    text-transform: none;
    white-space: nowrap;
    cursor: pointer;
    transition: background var(--rg-t), color var(--rg-t), border-color var(--rg-t), transform var(--rg-t), opacity var(--rg-t);
  }

  .register-btn:hover {
    background: transparent;
    color: var(--rg-text);
    border-color: var(--primary-color);
    transform: translateY(-1px);
  }

  .register-footer-note {
    margin-top: 12px;
    color: var(--rg-text-4);
    font-size: 10px;
    line-height: 1.5;
    text-align: center;
  }

  @media (max-width: 1024px) {
    .register-header {
      padding: 16px 16px 14px;
    }

    .register-body {
      padding: 14px 16px 16px;
    }

    .register-title {
      font-size: 19px;
    }

    .register-note {
      font-size: 11px;
    }

    .register-form-grid {
      gap: 8px;
    }

    .register-page input[type="text"],
    .register-page input[type="email"],
    .register-page input[type="password"] {
      height: 32px;
      min-height: 32px;
      font-size: 11px;
    }

    .register-btn {
      height: 31px;
      min-height: 31px;
      font-size: 10px;
    }
  }

  .register-page input:-webkit-autofill,
.register-page input:-webkit-autofill:hover,
.register-page input:-webkit-autofill:focus,
.register-page input:-webkit-autofill:active {
  -webkit-text-fill-color: var(--rg-text) !important;
  -webkit-box-shadow: 0 0 0 1000px var(--rg-surface-3) inset !important;
  box-shadow: 0 0 0 1000px var(--rg-surface-3) inset !important;
  border: 1px solid var(--rg-border-2) !important;
  transition: background-color 9999s ease-in-out 0s;
}
</style>

<div class="register-page">
  <section class="card register-card">
    <div class="register-header">
      <h2 class="register-title">Dodaj konto</h2>
<p class="register-note">Utwórz nowe konto administratora systemu.</p>
    </div>

    <div class="register-body">
      <form action="{{ url_for('register') }}" method="POST" class="register-form">
        <div class="register-form-grid">
          <div class="register-row">
            <label for="full_name">Imię i nazwisko</label>
            <input
              type="text"
              name="full_name"
              id="full_name"
              placeholder="Wpisz imię i nazwisko"
              required
            >
          </div>

          <div class="register-row">
            <label for="email">Adres e-mail</label>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Wpisz adres e-mail"
              required
            >
          </div>

          <div class="register-row">
            <label for="password">Hasło</label>
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Wpisz hasło"
              required
            >
          </div>

          <div class="register-row">
            <label for="confirm_password">Powtórz hasło</label>
            <input
              type="password"
              name="confirm_password"
              id="confirm_password"
              placeholder="Powtórz hasło"
              required
            >
          </div>
        </div>

        <div class="register-actions">
          <button type="submit" class="register-btn">Utwórz konto</button>
        </div>
      </form>

      <div class="register-footer-note">
        Po utworzeniu konta będziesz mógł zalogować się do panelu.
      </div>
    </div>
  </section>
</div>

{% endblock %}
